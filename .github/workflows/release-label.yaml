name: "[PR Management] Add PR Label"

on:
  pull_request:
    types: [opened, reopened, edited]
    branches:
      - main
      - 'release-harvester-v*'

# permissions:
#   pull-requests: write

jobs:
  label:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions: # 嚴格限制權限
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
     
